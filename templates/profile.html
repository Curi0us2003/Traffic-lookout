{% extends "base.html" %}

{% block title %}Profile - Firebase App{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2 style="color: #667eea; margin-bottom: 2rem;">User Profile</h2>
    
    <div class="user-info">
        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 1rem; margin-bottom: 1rem;">
            <strong>Full Name:</strong> <span>{{ user.name }}</span>
            <strong>Email:</strong> <span>{{ user.email }}</span>
            <strong>Phone:</strong> <span>{{ user.phone }}</span>
            <strong>Username:</strong> <span>{{ user.username }}</span>
            <strong>Role:</strong> <span>{{ user.role|title }}</span>
        </div>
    </div>
    
    <a href="{{ url_for('dashboard') }}" class="btn">Back to Dashboard</a>
</div>
{% endblock %}
